<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅程表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
    }
    .print-only { display: none; }
    @media print {
      .print-only { display: block; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

  <div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6 no-print">
      <h1 class="text-3xl font-bold text-gray-800">旅程表</h1>
      <div class="flex gap-2">
        <button onclick="clearAll()" class="px-4 py-2 text-sm bg-red-100 text-red-700 rounded hover:bg-red-200 transition">すべて削除</button>
        <button onclick="window.print()" class="px-4 py-2 text-sm bg-gray-800 text-white rounded hover:bg-gray-700 transition">印刷 / PDF</button>
      </div>
    </div>

    <!-- Trip title & date range -->
    <div class="bg-white rounded-xl shadow p-4 mb-4 no-print">
      <label class="block text-sm font-medium text-gray-600 mb-1">旅行タイトル</label>
      <input id="tripTitle" type="text" placeholder="例: 京都・大阪 3泊4日"
        class="w-full border border-gray-300 rounded px-3 py-2 text-lg font-semibold focus:outline-none focus:ring-2 focus:ring-blue-400 mb-3"
        oninput="saveTripTitle()" />
      <label class="block text-sm font-medium text-gray-600 mb-1">旅行期間</label>
      <div class="flex items-center gap-2">
        <input id="dateFrom" type="date" class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" onchange="saveDateRange()" />
        <span class="text-gray-400 text-sm">〜</span>
        <input id="dateTo" type="date" class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" onchange="saveDateRange()" />
        <button onclick="clearDateRange()" class="text-xs text-gray-400 hover:text-gray-600 underline ml-1">クリア</button>
      </div>
    </div>

    <!-- Print title (shown only when printing) -->
    <div class="hidden print:block text-2xl font-bold text-center mb-4" id="printTitle"></div>

    <!-- Add / Edit event form -->
    <div class="bg-white rounded-xl shadow p-4 mb-6 no-print">
      <div class="flex items-center justify-between mb-3">
        <h2 id="formTitle" class="text-lg font-semibold text-gray-700">イベント追加</h2>
        <button id="cancelBtn" onclick="cancelEdit()" class="hidden text-sm text-gray-500 hover:text-gray-700 underline">キャンセル</button>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
        <div>
          <label class="block text-xs text-gray-500 mb-1">日付</label>
          <input id="eventDate" type="date" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">時間帯（任意）</label>
          <div class="flex gap-1">
            <button onclick="selectCategory('午前')" id="cat-午前"
              class="flex-1 py-2 text-sm rounded border border-gray-300 text-gray-600 hover:bg-blue-50 hover:border-blue-400 transition">午前</button>
            <button onclick="selectCategory('午後')" id="cat-午後"
              class="flex-1 py-2 text-sm rounded border border-gray-300 text-gray-600 hover:bg-blue-50 hover:border-blue-400 transition">午後</button>
            <button onclick="selectCategory('夜')" id="cat-夜"
              class="flex-1 py-2 text-sm rounded border border-gray-300 text-gray-600 hover:bg-blue-50 hover:border-blue-400 transition">夜</button>
          </div>
        </div>
        <div class="sm:col-span-2">
          <label class="block text-xs text-gray-500 mb-1">内容</label>
          <input id="eventDesc" type="text" placeholder="例: 東京駅 出発（新幹線）"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            onkeydown="if(event.key==='Enter') addEvent()" />
        </div>
      </div>
      <div class="flex justify-end mt-3">
        <button id="submitBtn" onclick="addEvent()" class="px-5 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition text-sm font-medium">追加</button>
      </div>
    </div>

    <!-- Itinerary table -->
    <div id="itinerary"></div>
  </div>

  <script>
    const STORAGE_KEY = 'travel_itinerary_v1';
    const CATEGORY_ORDER = { '午前': 0, '午後': 1, '夜': 2, '': 3 };

    let data = load();
    let selectedCategory = '';
    let editingId = null;

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { title: '', dateFrom: '', dateTo: '', excludedDates: [], events: [] };
      } catch {
        return { title: '', dateFrom: '', dateTo: '', excludedDates: [], events: [] };
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function saveTripTitle() {
      data.title = document.getElementById('tripTitle').value;
      document.getElementById('printTitle').textContent = data.title;
      save();
    }

    function saveDateRange() {
      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;
      if (from && to && from > to) return;
      data.dateFrom = from;
      data.dateTo = to;
      save();
      render();
    }

    function clearDateRange() {
      data.dateFrom = '';
      data.dateTo = '';
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value = '';
      save();
      render();
    }

    function getDatesInRange(from, to) {
      const dates = [];
      const end = new Date(to + 'T00:00:00');
      for (let d = new Date(from + 'T00:00:00'); d <= end; d.setDate(d.getDate() + 1)) {
        dates.push(d.toISOString().split('T')[0]);
      }
      return dates;
    }

    function selectCategory(cat) {
      selectedCategory = selectedCategory === cat ? '' : cat;
      ['午前', '午後', '夜'].forEach(c => {
        const btn = document.getElementById('cat-' + c);
        if (c === selectedCategory) {
          btn.className = 'flex-1 py-2 text-sm rounded border border-blue-500 bg-blue-500 text-white transition';
        } else {
          btn.className = 'flex-1 py-2 text-sm rounded border border-gray-300 text-gray-600 hover:bg-blue-50 hover:border-blue-400 transition';
        }
      });
    }

    function addEvent() {
      const date = document.getElementById('eventDate').value;
      const desc = document.getElementById('eventDesc').value.trim();

      if (!date || !desc) {
        alert('日付と内容を入力してください。');
        return;
      }

      if (editingId !== null) {
        const e = data.events.find(ev => ev.id === editingId);
        if (e) { e.date = date; e.time = selectedCategory; e.desc = desc; }
      } else {
        data.events.push({ id: Date.now(), date, time: selectedCategory, desc });
      }

      data.events.sort((a, b) => {
        if (a.date !== b.date) return a.date.localeCompare(b.date);
        return (CATEGORY_ORDER[a.time] ?? 3) - (CATEGORY_ORDER[b.time] ?? 3);
      });
      save();
      render();
      cancelEdit();
    }

    function editEvent(id) {
      const e = data.events.find(ev => ev.id === id);
      if (!e) return;
      editingId = id;
      document.getElementById('eventDate').value = e.date;
      document.getElementById('eventDesc').value = e.desc;
      selectCategory(e.time || '');
      document.getElementById('formTitle').textContent = 'イベント編集';
      document.getElementById('submitBtn').textContent = '更新';
      document.getElementById('cancelBtn').classList.remove('hidden');
      document.getElementById('eventDesc').focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function selectDate(date) {
      cancelEdit();
      document.getElementById('eventDate').value = date;
      document.getElementById('eventDesc').focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
      editingId = null;
      document.getElementById('eventDate').value = '';
      document.getElementById('eventDesc').value = '';
      selectCategory('');
      document.getElementById('formTitle').textContent = 'イベント追加';
      document.getElementById('submitBtn').textContent = '追加';
      document.getElementById('cancelBtn').classList.add('hidden');
    }

    function deleteEvent(id) {
      if (editingId === id) cancelEdit();
      data.events = data.events.filter(e => e.id !== id);
      save();
      render();
    }

    function deleteColumn(date, event) {
      event.stopPropagation();
      if (!confirm(`${formatDate(date)} の列を削除しますか？\nその日のイベントもすべて削除されます。`)) return;
      if (editingId !== null && data.events.find(e => e.id === editingId)?.date === date) cancelEdit();
      data.events = data.events.filter(e => e.date !== date);
      if (!data.excludedDates) data.excludedDates = [];
      if (!data.excludedDates.includes(date)) data.excludedDates.push(date);
      save();
      render();
    }

    function clearAll() {
      if (!confirm('すべてのイベントを削除しますか？')) return;
      cancelEdit();
      data.events = [];
      save();
      render();
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${days[d.getDay()]}）`;
    }

    function groupByDate(events) {
      const map = {};
      for (const e of events) {
        if (!map[e.date]) map[e.date] = [];
        map[e.date].push(e);
      }
      return Object.entries(map).sort(([a], [b]) => a.localeCompare(b));
    }

    function dayLabel(index) {
      return `${index + 1}日目`;
    }

    function categoryBadge(cat) {
      if (!cat) return '';
      const colors = { '午前': 'bg-sky-100 text-sky-700', '午後': 'bg-orange-100 text-orange-700', '夜': 'bg-indigo-100 text-indigo-700' };
      return `<span class="inline-block text-xs px-2 py-0.5 rounded-full font-medium ${colors[cat] || ''} mb-1">${cat}</span>`;
    }

    function render() {
      const container = document.getElementById('itinerary');

      // Build the set of dates to show as columns
      const excluded = data.excludedDates || [];
      let allDates = [];
      if (data.dateFrom && data.dateTo) {
        allDates = getDatesInRange(data.dateFrom, data.dateTo);
        for (const e of data.events) {
          if (!allDates.includes(e.date)) allDates.push(e.date);
        }
        allDates.sort();
      } else {
        allDates = [...new Set(data.events.map(e => e.date))].sort();
      }
      allDates = allDates.filter(d => !excluded.includes(d));

      if (allDates.length === 0) {
        container.innerHTML = `
          <div class="text-center text-gray-400 py-16">
            <div class="text-5xl mb-3">✈️</div>
            <p class="text-lg">旅行期間を設定するか、上のフォームからイベントを追加してください。</p>
          </div>`;
        return;
      }

      const eventMap = groupByDate(data.events);
      const groups = allDates.map(date => [date, eventMap[date] || []]);
      const maxRows = Math.max(...groups.map(([, events]) => events.length));

      const headerCells = groups.map(([date, ], i) => `
        <th class="px-4 py-3 text-left border-r border-gray-200 min-w-[200px] last:border-r-0 cursor-pointer select-none group" onclick="selectDate('${date}')">
          <div class="flex items-start justify-between no-print">
            <div>
              <div class="text-xs font-bold text-blue-600 mb-1">${dayLabel(i)}</div>
              <div class="text-sm font-bold text-gray-700 group-hover:text-blue-600 transition">${formatDate(date)}</div>
              <div class="text-xs text-gray-400 mt-0.5">＋ 追加</div>
            </div>
            <button onclick="deleteColumn('${date}', event)" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition text-sm cursor-pointer leading-none" title="この列を削除">✕</button>
          </div>
          <div class="print-only text-sm font-bold text-gray-700">${formatDate(date)}</div>
        </th>`).join('');

      const bodyRows = Array.from({ length: maxRows }, (_, rowIndex) => {
        const cells = groups.map(([, events]) => {
          const e = events[rowIndex];
          if (!e) return `<td class="border-r border-gray-100 last:border-r-0 px-4 py-3"></td>`;
          const isEditing = e.id === editingId;
          return `
            <td class="border-r border-gray-100 last:border-r-0 px-4 py-3 align-top ${isEditing ? 'bg-blue-50' : ''}">
              <div class="flex items-start justify-between gap-2">
                <div>
                  ${categoryBadge(e.time)}
                  <div class="text-sm text-gray-800">${escapeHtml(e.desc)}</div>
                </div>
                <div class="flex gap-1 flex-shrink-0 no-print">
                  <button onclick="editEvent(${e.id})" class="text-gray-400 hover:text-blue-500 transition text-xs" title="編集">✎</button>
                  <button onclick="deleteEvent(${e.id})" class="text-gray-400 hover:text-red-500 transition text-xs" title="削除">✕</button>
                </div>
              </div>
            </td>`;
        }).join('');
        return `<tr class="${rowIndex % 2 === 0 ? 'bg-white' : 'bg-gray-50'} border-t border-gray-100">${cells}</tr>`;
      }).join('');

      container.innerHTML = `
        <div class="bg-white rounded-xl shadow overflow-x-auto">
          <table class="text-sm border-collapse w-full">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-200">${headerCells}</tr>
            </thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Initialize
    document.getElementById('tripTitle').value = data.title;
    document.getElementById('printTitle').textContent = data.title;
    document.getElementById('dateFrom').value = data.dateFrom || '';
    document.getElementById('dateTo').value = data.dateTo || '';
    render();
  </script>
</body>
</html>
