<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅程表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
    }
    .print-only { display: none; }
    @media print {
      .print-only { display: block; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- ═══════════════════════════════════════════════════
     SCREEN: Auth (login / signup)
═══════════════════════════════════════════════════ -->
<div id="screen-auth" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-1 text-center">旅程表</h1>
    <p class="text-sm text-gray-400 text-center mb-6">旅のすべてを、ひとつの表に。</p>

    <div id="auth-error" class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2"></div>

    <div class="mb-4">
      <label class="block text-xs font-medium text-gray-600 mb-1">ログインID</label>
      <input id="auth-username" type="text" placeholder="半角英数字・アンダースコア"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        onkeydown="if(event.key==='Enter') authSubmit()" />
    </div>
    <div class="mb-6">
      <label class="block text-xs font-medium text-gray-600 mb-1">パスワード</label>
      <input id="auth-password" type="password" placeholder="6文字以上"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        onkeydown="if(event.key==='Enter') authSubmit()" />
    </div>

    <button onclick="authSubmit()" id="auth-btn"
      class="w-full py-2 bg-blue-600 text-white rounded font-medium text-sm hover:bg-blue-700 transition mb-3">
      ログイン
    </button>
    <button onclick="toggleAuthMode()"
      class="w-full py-2 bg-gray-100 text-gray-600 rounded text-sm hover:bg-gray-200 transition">
      <span id="auth-toggle-label">アカウント作成に切り替え</span>
    </button>
    <p id="auth-mode-hint" class="text-center text-xs text-gray-400 mt-3">ログインモード</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     SCREEN: Trip list
═══════════════════════════════════════════════════ -->
<div id="screen-trips" class="hidden min-h-screen p-4">
  <div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800">旅程表</h1>
      <div class="flex items-center gap-2">
        <span id="user-email-label" class="text-xs text-gray-400 hidden sm:block"></span>
        <button onclick="openFoodScreen('trips')" class="px-3 py-1.5 text-sm bg-orange-50 text-orange-700 rounded hover:bg-orange-100 transition">🍽 食べ物マスタ</button>
        <button onclick="logout()" class="px-3 py-1.5 text-sm bg-gray-100 text-gray-600 rounded hover:bg-gray-200 transition">ログアウト</button>
      </div>
    </div>

    <!-- New trip form -->
    <div class="bg-white rounded-xl shadow p-4 mb-4">
      <h2 class="text-sm font-semibold text-gray-600 mb-3">新しい旅を作成</h2>
      <div class="flex gap-2">
        <input id="new-trip-title" type="text" placeholder="例: 京都・大阪 3泊4日"
          class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          onkeydown="if(event.key==='Enter') createTrip()" />
        <button onclick="createTrip()" class="px-4 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700 transition font-medium">作成</button>
      </div>
    </div>

    <!-- Trip list -->
    <div id="trip-list-error" class="hidden mb-3 text-sm text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2"></div>
    <div id="trip-list" class="space-y-2">
      <div class="text-center text-gray-400 py-8 text-sm">読み込み中…</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     SCREEN: Trip detail
═══════════════════════════════════════════════════ -->
<div id="screen-detail" class="hidden min-h-screen p-4">
  <div class="max-w-5xl mx-auto">

    <!-- Top bar -->
    <div class="flex items-center justify-between mb-4 no-print">
      <button onclick="goToTrips()" class="flex items-center gap-1 text-sm text-blue-600 hover:text-blue-800 transition">
        ← 旅一覧
      </button>
      <div class="flex gap-2">
        <button onclick="openFoodScreen('detail')" class="px-3 py-1.5 text-sm bg-orange-50 text-orange-700 rounded hover:bg-orange-100 transition">🍽 食べ物</button>
        <button onclick="openShareModal()" class="px-3 py-1.5 text-sm bg-indigo-50 text-indigo-700 rounded hover:bg-indigo-100 transition">共有</button>
        <button onclick="window.print()" class="px-3 py-1.5 text-sm bg-gray-800 text-white rounded hover:bg-gray-700 transition">印刷 / PDF</button>
        <button onclick="deleteTrip()" class="px-3 py-1.5 text-sm bg-red-50 text-red-600 rounded hover:bg-red-100 transition">削除</button>
      </div>
    </div>

    <!-- Trip title & date range -->
    <div class="bg-white rounded-xl shadow p-4 mb-4 no-print">
      <label class="block text-sm font-medium text-gray-600 mb-1">旅行タイトル</label>
      <input id="tripTitle" type="text" placeholder="例: 京都・大阪 3泊4日"
        class="w-full border border-gray-300 rounded px-3 py-2 text-lg font-semibold focus:outline-none focus:ring-2 focus:ring-blue-400 mb-3"
        oninput="saveTripTitle()" />
      <label class="block text-sm font-medium text-gray-600 mb-1">旅行期間</label>
      <div class="flex items-center gap-2">
        <input id="dateFrom" type="date" class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" onchange="saveDateRange()" />
        <span class="text-gray-400 text-sm">〜</span>
        <input id="dateTo" type="date" class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" onchange="saveDateRange()" />
        <button onclick="clearDateRange()" class="text-xs text-gray-400 hover:text-gray-600 underline ml-1">クリア</button>
      </div>
    </div>

    <!-- Read-only banner for view-only shared trips -->
    <div id="readonly-banner" class="hidden bg-amber-50 border border-amber-200 text-amber-700 text-sm rounded-lg px-4 py-2 mb-4 no-print">
      このプランは閲覧のみです（編集権限がありません）。
    </div>

    <!-- Print title -->
    <div class="print-only text-2xl font-bold text-center mb-4" id="printTitle"></div>

    <!-- Add / Edit event form -->
    <div id="event-form-wrapper" class="bg-white rounded-xl shadow p-4 mb-6 no-print">
      <div class="flex items-center justify-between mb-3">
        <h2 id="formTitle" class="text-lg font-semibold text-gray-700">イベント追加</h2>
        <button id="cancelBtn" onclick="cancelEdit()" class="hidden text-sm text-gray-500 hover:text-gray-700 underline">キャンセル</button>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
        <div>
          <label class="block text-xs text-gray-500 mb-1">日付</label>
          <input id="eventDate" type="date" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">種類</label>
          <div class="flex gap-1">
            <button type="button" onclick="setKind('plan')" id="kind-plan"
              class="flex-1 py-2 text-sm rounded border transition">📍 予定</button>
            <button type="button" onclick="setKind('meal')" id="kind-meal"
              class="flex-1 py-2 text-sm rounded border transition">🍽 食事</button>
          </div>
        </div>
        <div class="lg:col-span-2">
          <label class="block text-xs text-gray-500 mb-1">時刻（任意）</label>
          <div class="flex items-center gap-1">
            <input id="eventStart" type="time" class="flex-1 min-w-0 border border-gray-300 rounded px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            <span class="text-gray-400 text-sm">〜</span>
            <input id="eventEnd" type="time" class="flex-1 min-w-0 border border-gray-300 rounded px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
        </div>
        <div class="lg:col-span-4">
          <label class="block text-xs text-gray-500 mb-1">内容</label>
          <input id="eventDesc" type="text" placeholder="例: 東京駅 出発（新幹線）／ 昼食：一蘭ラーメン"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            onkeydown="if(event.key==='Enter') addEvent()" />
        </div>
      </div>
      <div class="flex justify-end mt-3">
        <button id="submitBtn" onclick="addEvent()" class="px-5 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition text-sm font-medium">追加</button>
      </div>
    </div>

    <!-- Itinerary table -->
    <div id="itinerary"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     SCREEN: Food master
═══════════════════════════════════════════════════ -->
<div id="screen-food" class="hidden min-h-screen p-4">
  <div class="max-w-lg mx-auto">
    <div class="flex items-center justify-between mb-6">
      <button onclick="closeFoodScreen()" class="flex items-center gap-1 text-sm text-blue-600 hover:text-blue-800 transition">
        ← 戻る
      </button>
      <h1 class="text-xl font-bold text-gray-800">🍽 食べ物マスタ</h1>
      <div class="w-16"></div>
    </div>

    <div class="bg-white rounded-xl shadow p-4 mb-4">
      <h2 class="text-sm font-semibold text-gray-600 mb-3">食べ物を追加</h2>
      <div class="flex gap-2">
        <input id="new-food-name" type="text" placeholder="例: 一蘭ラーメン"
          class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
          onkeydown="if(event.key==='Enter') addFoodItem()" />
        <button onclick="addFoodItem()" class="px-4 py-2 bg-orange-500 text-white rounded text-sm hover:bg-orange-600 transition font-medium">追加</button>
      </div>
      <div id="food-error" class="hidden mt-2 text-sm text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2"></div>
    </div>

    <div class="bg-white rounded-xl shadow p-4">
      <h2 class="text-sm font-semibold text-gray-600 mb-3">食べ物リスト</h2>
      <div id="food-items-list" class="space-y-1.5">
        <div class="text-gray-400 text-sm text-center py-4">読み込み中…</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     MODAL: Share trip
═══════════════════════════════════════════════════ -->
<div id="share-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold text-gray-800">旅程を共有</h2>
      <button onclick="closeShareModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>

    <div id="share-error" class="hidden mb-3 text-sm text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2"></div>
    <div id="share-success" class="hidden mb-3 text-sm text-green-600 bg-green-50 border border-green-200 rounded px-3 py-2"></div>

    <!-- Add share -->
    <div class="mb-4">
      <label class="block text-xs font-medium text-gray-600 mb-1">メールアドレス</label>
      <input id="share-email" type="email" placeholder="friend@example.com"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 mb-2" />
      <label class="block text-xs font-medium text-gray-600 mb-1">権限</label>
      <select id="share-permission" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 mb-3">
        <option value="view">閲覧のみ</option>
        <option value="edit">編集可</option>
      </select>
      <button onclick="addShare()" class="w-full py-2 bg-blue-600 text-white rounded text-sm font-medium hover:bg-blue-700 transition">共有する</button>
    </div>

    <!-- Existing shares list -->
    <div>
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">共有中のユーザー</h3>
      <div id="share-list" class="space-y-2 max-h-48 overflow-y-auto text-sm text-gray-600">
        <div class="text-gray-400 text-xs">読み込み中…</div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// Supabase client
// ══════════════════════════════════════════════════
const SUPABASE_URL  = 'https://ceqiwvaaxpgmtcuoqulh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlcWl3dmFheHBnbXRjdW9xdWxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjI1NTUsImV4cCI6MjA5NDU5ODU1NX0.66nqe6Z7uxkfXMAf5d83k6tbXScN6_qJMk12LQYLbUo';

// navigator.locks を使わない no-op ロック。
// 既定の navigatorLock はタブ切替時にデッドロックし、トークン更新を待つ
// 全クエリ・signOut がハングする原因になるため無効化する（1タブ完結アプリのため問題なし）。
const noopLock = async (name, acquireTimeout, fn) => await fn();

let sb;
try {
  const { createClient } = supabase;
  sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: false,
      lock: noopLock,
    },
  });
} catch (e) {
  document.getElementById('auth-error').textContent = 'アプリの初期化に失敗しました: ' + e.message;
  document.getElementById('auth-error').classList.remove('hidden');
  console.error('Supabase init error:', e);
}

// ══════════════════════════════════════════════════
// App state
// ══════════════════════════════════════════════════
let currentUser      = null;   // auth.User
let currentTrip      = null;   // trips row
let currentEvents    = [];     // events rows for current trip
let canEdit          = false;  // edit permission flag
let editingId        = null;   // uuid of event being edited
let selectedKind     = 'plan'; // 'plan' | 'meal'
let foodItems        = [];     // food_items rows for current user
let mealAssignments  = [];     // meal_assignments rows for current trip
let foodScreenFrom   = 'trips'; // which screen to return to from food master

const MEAL_SLOTS = [
  { key: 'breakfast', label: '朝食' },
  { key: 'lunch',     label: '昼食' },
  { key: 'dinner',    label: '夕食' },
];

const DEFAULT_FOODS = [
  '卍ラーメン', 'サムギョプサル', 'しゃぶしゃぶ', '焼肉 肉テラス', '牛タンねぎし',
  '冷麺', '湯葉', '漬物', 'トマトラーメン', '焼き魚', 'ローストビーフ丼',
  '卵かけご飯', 'ネギサラダ', 'いきなりステーキ', '焼き鳥', 'ファミチキ',
  '屋台の焼きそば', 'キムチきゅうり', 'きゅうりの一本漬け',
];

// ══════════════════════════════════════════════════
// Screen helpers
// ══════════════════════════════════════════════════
function showScreen(id) {
  ['screen-auth', 'screen-trips', 'screen-detail', 'screen-food'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

// Supabase クエリにタイムアウトを付けて、ハング時に原因を表示できるようにする
function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error(`${label} がタイムアウトしました（${ms / 1000}秒）。Supabaseのポリシー設定を確認してください。`)), ms)
    ),
  ]);
}

// ══════════════════════════════════════════════════
// Auth
// ══════════════════════════════════════════════════
let authMode = 'login'; // or 'signup'

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  document.getElementById('auth-btn').textContent       = authMode === 'login' ? 'ログイン' : 'アカウント作成';
  document.getElementById('auth-toggle-label').textContent = authMode === 'login' ? 'アカウント作成に切り替え' : 'ログインに切り替え';
  document.getElementById('auth-mode-hint').textContent = authMode === 'login' ? 'ログインモード' : '新規登録モード';
  document.getElementById('auth-error').classList.add('hidden');
}

// ログインID → 内部メールに変換（Supabase Auth はメール必須のため）
// .local は Supabase に拒否されるため通常の TLD を使う
function usernameToEmail(username) {
  return username.toLowerCase() + '@travel-app.example.com';
}

async function authSubmit() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  errEl.classList.add('hidden');

  if (!username || !password) {
    errEl.textContent = 'ログインIDとパスワードを入力してください。';
    errEl.classList.remove('hidden');
    return;
  }

  // ID バリデーション: 半角英数字・アンダースコアのみ
  if (!/^[a-zA-Z0-9_]+$/.test(username)) {
    errEl.textContent = 'ログインIDは半角英数字・アンダースコアのみ使用できます。';
    errEl.classList.remove('hidden');
    return;
  }

  const email = usernameToEmail(username);
  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.textContent = '処理中…';

  let result;
  if (authMode === 'login') {
    result = await sb.auth.signInWithPassword({ email, password });
  } else {
    result = await sb.auth.signUp({ email, password, options: { data: { username } } });
  }

  btn.disabled = false;
  btn.textContent = authMode === 'login' ? 'ログイン' : 'アカウント作成';

  if (result.error) {
    // Supabase のエラーメッセージを日本語化
    const msg = result.error.message;
    if (msg.includes('already registered') || msg.includes('already been registered')) {
      errEl.textContent = 'そのIDはすでに使用されています。';
    } else if (msg.includes('Invalid login credentials')) {
      errEl.textContent = 'IDまたはパスワードが正しくありません。';
    } else {
      errEl.textContent = msg;
    }
    errEl.classList.remove('hidden');
    return;
  }
  // session established via onAuthStateChange
}

async function logout() {
  // サーバー応答を待たず、ローカルセッションを消して即ログイン画面へ
  currentUser = null;
  currentTrip = null;
  currentEvents = [];
  if (sb) {
    sb.auth.signOut({ scope: 'local' }).catch(e => console.error('logout error:', e));
  }
  showScreen('screen-auth');
}

// ══════════════════════════════════════════════════
// Trip list screen
// ══════════════════════════════════════════════════
async function loadTrips() {
  showScreen('screen-trips');
  // ユーザー名を表示（メタデータ→なければメールからID部分を取り出す）
  const username = currentUser.user_metadata?.username
    || currentUser.email?.replace(/@travel-app\.(example\.com|local)$/, '')
    || '';
  document.getElementById('user-email-label').textContent = username ? username + ' さん' : '';

  const listEl = document.getElementById('trip-list');
  const errEl  = document.getElementById('trip-list-error');
  errEl.classList.add('hidden');
  listEl.innerHTML = '<div class="text-center text-gray-400 py-8 text-sm">読み込み中…</div>';

  try {
    // Own trips（10秒で応答がなければタイムアウトして原因を表示）
    const { data: ownTrips, error: e1 } = await withTimeout(
      sb.from('trips')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false }),
      10000, 'trips の読み込み'
    );
    if (e1) throw e1;

    // Shared trips — find shares that match our email
    let shares = [], e2 = null;
    try {
      const res = await withTimeout(
        sb.from('trip_shares')
          .select('trip_id, permission')
          .eq('shared_with_email', currentUser.email),
        10000, 'trip_shares の読み込み'
      );
      shares = res.data || [];
      e2 = res.error;
    } catch (shareErr) {
      // trip_shares が無くてもアプリは動かす
      console.warn('trip_shares skipped:', shareErr.message);
    }
    // trip_shares may not exist yet — treat as empty, not fatal
    const safeShares = e2 ? [] : (shares || []);
    if (e2) console.warn('trip_shares:', e2.message);

    let sharedTrips = [];
    if (safeShares.length) {
      const sharedIds = safeShares.map(s => s.trip_id);
      const { data: st } = await sb
        .from('trips')
        .select('*')
        .in('id', sharedIds)
        .order('created_at', { ascending: false });
      if (st) {
        sharedTrips = st.map(t => {
          const s = safeShares.find(sh => sh.trip_id === t.id);
          return { ...t, _permission: s ? s.permission : 'view', _shared: true };
        });
      }
    }

    const allTrips = [
      ...(ownTrips || []).map(t => ({ ...t, _permission: 'edit', _shared: false })),
      ...sharedTrips,
    ];

    if (allTrips.length === 0) {
      listEl.innerHTML = `
        <div class="text-center text-gray-400 py-12">
          <div class="text-5xl mb-3">✈️</div>
          <p class="text-sm">旅程がまだありません。上のフォームから作成してください。</p>
        </div>`;
      return;
    }

    listEl.innerHTML = allTrips.map(t => `
      <div class="bg-white rounded-xl shadow p-4 flex items-center justify-between cursor-pointer hover:shadow-md transition"
           onclick="openTrip('${t.id}')">
        <div>
          <div class="font-semibold text-gray-800">${escapeHtml(t.title || '（タイトルなし）')}</div>
          <div class="text-xs text-gray-400 mt-0.5">
            ${t.date_from && t.date_to ? `${t.date_from} 〜 ${t.date_to}` : '期間未設定'}
            ${t._shared ? `<span class="ml-2 bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded text-xs">${t._permission === 'edit' ? '共有（編集可）' : '共有（閲覧）'}</span>` : ''}
          </div>
        </div>
        <div class="text-gray-300 text-lg">›</div>
      </div>`).join('');

  } catch (err) {
    console.error('loadTrips error:', err);
    errEl.textContent = 'データの読み込みに失敗しました: ' + err.message;
    errEl.classList.remove('hidden');
    listEl.innerHTML = `
      <div class="text-center py-8">
        <button onclick="loadTrips()" class="px-4 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700 transition">再読み込み</button>
      </div>`;
  }
}

async function createTrip() {
  if (!sb || !currentUser) { alert('ログインし直してください。'); return; }
  const titleEl = document.getElementById('new-trip-title');
  const title = titleEl.value.trim();
  if (!title) { titleEl.focus(); return; }

  const errEl = document.getElementById('trip-list-error');
  errEl.classList.add('hidden');

  try {
    const { data, error } = await sb
      .from('trips')
      .insert({ user_id: currentUser.id, title })
      .select()
      .single();

    if (error) {
      errEl.textContent = error.message;
      errEl.classList.remove('hidden');
      return;
    }
    titleEl.value = '';
    await openTrip(data.id);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

// Trip detail screen
// ══════════════════════════════════════════════════
async function openTrip(tripId) {
  showScreen('screen-detail');
  document.getElementById('itinerary').innerHTML = '<div class="text-center text-gray-400 py-12 text-sm">読み込み中…</div>';

  // Load trip
  const { data: trip, error: te } = await sb
    .from('trips')
    .select('*')
    .eq('id', tripId)
    .single();

  if (te || !trip) {
    alert('旅程の読み込みに失敗しました。');
    goToTrips();
    return;
  }
  currentTrip = trip;

  // Determine edit permission
  if (trip.user_id === currentUser.id) {
    canEdit = true;
  } else {
    const { data: sh } = await sb
      .from('trip_shares')
      .select('permission')
      .eq('trip_id', tripId)
      .eq('shared_with_email', currentUser.email)
      .single();
    canEdit = sh && sh.permission === 'edit';
  }

  // Load events（これが本体。失敗してもアプリは止めない）
  const { data: events } = await sb
    .from('events')
    .select('*')
    .eq('trip_id', tripId)
    .order('date')
    .order('start_time', { nullsFirst: false })
    .order('created_at');

  currentEvents = events || [];
  sortEvents();

  // Populate form fields
  document.getElementById('tripTitle').value = trip.title || '';
  document.getElementById('printTitle').textContent = trip.title || '';
  document.getElementById('dateFrom').value = trip.date_from || '';
  document.getElementById('dateTo').value = trip.date_to || '';

  // Read-only banner & form
  document.getElementById('readonly-banner').classList.toggle('hidden', canEdit);
  document.getElementById('event-form-wrapper').classList.toggle('hidden', !canEdit);

  cancelEdit();
  // まず旅程表を描画（food_items / meal_assignments テーブルが未作成でも表示する）
  foodItems = [];
  mealAssignments = [];
  render();

  // 食べ物・食事割り当ては任意機能。読み込めたら再描画する。
  // テーブル未作成でも上の render() で旅程表は表示済みなので影響しない。
  Promise.all([loadFoodItems(), loadMealAssignments()])
    .then(() => render())
    .catch(err => console.warn('food/meal load skipped:', err));
}

function goToTrips() {
  currentTrip   = null;
  currentEvents = [];
  canEdit       = false;
  loadTrips();
}

async function deleteTrip() {
  if (!currentTrip || currentTrip.user_id !== currentUser.id) {
    alert('この旅程を削除する権限がありません。');
    return;
  }
  if (!confirm(`「${currentTrip.title || '旅程'}」を完全に削除しますか？\nこの操作は元に戻せません。`)) return;
  const { error } = await sb.from('trips').delete().eq('id', currentTrip.id);
  if (error) { alert(error.message); return; }
  goToTrips();
}

// ── Event CRUD ──

async function addEvent() {
  if (!canEdit) return;
  const date  = document.getElementById('eventDate').value;
  const start = document.getElementById('eventStart').value;
  const end   = document.getElementById('eventEnd').value;
  const desc  = document.getElementById('eventDesc').value.trim();
  if (!date || !desc) { alert('日付と内容を入力してください。'); return; }
  if (start && end && end < start) { alert('終了時刻は開始時刻より後にしてください。'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  const fields = { date, start_time: start, end_time: end, description: desc, kind: selectedKind };

  if (editingId !== null) {
    // Update existing
    const { error } = await sb
      .from('events')
      .update(fields)
      .eq('id', editingId);
    if (error) { alert(error.message); btn.disabled = false; return; }
    const idx = currentEvents.findIndex(e => e.id === editingId);
    if (idx !== -1) Object.assign(currentEvents[idx], fields);
  } else {
    // Restore excluded date if needed
    const excluded = currentTrip.excluded_dates || [];
    let newExcluded = excluded;
    if (excluded.includes(date)) {
      newExcluded = excluded.filter(d => d !== date);
      await sb.from('trips').update({ excluded_dates: newExcluded }).eq('id', currentTrip.id);
      currentTrip.excluded_dates = newExcluded;
    }

    const { data: newEv, error } = await sb
      .from('events')
      .insert({ trip_id: currentTrip.id, ...fields })
      .select()
      .single();
    if (error) { alert(error.message); btn.disabled = false; return; }
    currentEvents.push(newEv);
  }

  sortEvents();
  btn.disabled = false;
  render();
  cancelEdit();
}

function editEvent(id) {
  const e = currentEvents.find(ev => ev.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('eventDate').value  = e.date;
  document.getElementById('eventStart').value = e.start_time || '';
  document.getElementById('eventEnd').value   = e.end_time || '';
  document.getElementById('eventDesc').value  = e.description;
  setKind(e.kind === 'meal' ? 'meal' : 'plan');
  document.getElementById('formTitle').textContent  = 'イベント編集';
  document.getElementById('submitBtn').textContent   = '更新';
  document.getElementById('cancelBtn').classList.remove('hidden');
  document.getElementById('eventDesc').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  editingId = null;
  document.getElementById('eventDate').value  = '';
  document.getElementById('eventStart').value = '';
  document.getElementById('eventEnd').value   = '';
  document.getElementById('eventDesc').value  = '';
  setKind('plan');
  document.getElementById('formTitle').textContent = 'イベント追加';
  document.getElementById('submitBtn').textContent  = '追加';
  document.getElementById('cancelBtn').classList.add('hidden');
}

async function deleteEvent(id) {
  if (!canEdit) return;
  if (editingId === id) cancelEdit();
  const { error } = await sb.from('events').delete().eq('id', id);
  if (error) { alert(error.message); return; }
  currentEvents = currentEvents.filter(e => e.id !== id);
  render();
}

async function deleteColumn(date, ev) {
  if (!canEdit) return;
  ev.stopPropagation();
  if (!confirm(`${formatDate(date)} の列を削除しますか？\nその日のイベントもすべて削除されます。`)) return;

  // Delete events on that date
  const ids = currentEvents.filter(e => e.date === date).map(e => e.id);
  if (ids.length) {
    const { error } = await sb.from('events').delete().in('id', ids);
    if (error) { alert(error.message); return; }
  }
  currentEvents = currentEvents.filter(e => e.date !== date);

  // Add to excluded_dates
  const excluded = currentTrip.excluded_dates || [];
  if (!excluded.includes(date)) {
    const newExcluded = [...excluded, date];
    await sb.from('trips').update({ excluded_dates: newExcluded }).eq('id', currentTrip.id);
    currentTrip.excluded_dates = newExcluded;
  }
  if (editingId !== null && currentEvents.find(e => e.id === editingId)?.date === date) cancelEdit();
  render();
}

// ── Helpers ──

function sortEvents() {
  currentEvents.sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    // 時刻あり → 時刻順。時刻なし（空）は末尾へ。
    const ta = a.start_time || '99:99';
    const tb = b.start_time || '99:99';
    return ta.localeCompare(tb);
  });
}

function selectDate(date) {
  if (!canEdit) return;
  cancelEdit();
  document.getElementById('eventDate').value = date;
  document.getElementById('eventDesc').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 時刻セルをクリック → 日付＋開始時刻を入力欄にセット
function selectDateHour(date, time) {
  if (!canEdit) return;
  cancelEdit();
  document.getElementById('eventDate').value  = date;
  document.getElementById('eventStart').value = time;
  document.getElementById('eventDesc').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

function getDatesInRange(from, to) {
  const dates = [];
  const end = new Date(to + 'T12:00:00');
  for (let d = new Date(from + 'T12:00:00'); d <= end; d.setDate(d.getDate() + 1)) {
    dates.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
  }
  return dates;
}

function groupByDate(events) {
  const map = {};
  for (const e of events) {
    if (!map[e.date]) map[e.date] = [];
    map[e.date].push(e);
  }
  return map;
}

function timeBadge(e) {
  const start = e.start_time || '';
  const end   = e.end_time || '';
  if (!start && !end) return '';
  const label = start && end ? `${start}〜${end}` : (start ? `${start}〜` : `〜${end}`);
  const color = e.kind === 'meal' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700';
  return `<span class="inline-block text-xs px-2 py-0.5 rounded font-medium ${color} mb-1">${label}</span>`;
}

function kindIcon(e) {
  return e.kind === 'meal' ? '🍽' : '📍';
}

function dayBg(dateStr) {
  const dow = new Date(dateStr + 'T12:00:00').getDay();
  if (dow === 6) return 'bg-indigo-50';
  if (dow === 0) return 'bg-red-50';
  return '';
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Render ──

function render() {
  const container = document.getElementById('itinerary');
  const excluded  = currentTrip ? (currentTrip.excluded_dates || []) : [];
  const dateFrom  = currentTrip ? (currentTrip.date_from || '') : '';
  const dateTo    = currentTrip ? (currentTrip.date_to   || '') : '';

  let allDates = [];
  if (dateFrom && dateTo) {
    allDates = getDatesInRange(dateFrom, dateTo);
    for (const e of currentEvents) {
      if (!allDates.includes(e.date)) allDates.push(e.date);
    }
    allDates.sort();
  } else {
    allDates = [...new Set(currentEvents.map(e => e.date))].sort();
  }
  allDates = allDates.filter(d => !excluded.includes(d));

  if (allDates.length === 0) {
    container.innerHTML = `
      <div class="text-center text-gray-400 py-16">
        <div class="text-5xl mb-3">✈️</div>
        <p class="text-lg">旅行期間を設定するか、上のフォームからイベントを追加してください。</p>
      </div>`;
    return;
  }

  // ── ヘッダー（左上の時刻軸セル + 日付列） ──
  const cornerTh = `<th class="bg-gray-100 border-r border-b border-gray-200 w-16 min-w-[4rem] sticky left-0 z-10"></th>`;
  const headerCells = groups.map(([date], i) => `
    <th class="px-4 py-3 text-left border-r border-gray-200 min-w-[180px] last:border-r-0 ${canEdit ? 'cursor-pointer' : ''} select-none group ${dayBg(date)}"
        ${canEdit ? `onclick="selectDate('${date}')"` : ''}>
      <div class="flex items-start justify-between no-print">
        <div>
          <div class="text-xs font-bold text-blue-600 mb-1">${i + 1}日目</div>
          <div class="text-sm font-bold text-gray-700 ${canEdit ? 'group-hover:text-blue-600' : ''} transition">${formatDate(date)}</div>
          ${canEdit ? `<div class="text-xs text-gray-400 mt-0.5">＋ 追加</div>` : ''}
        </div>
        ${canEdit ? `<button onclick="deleteColumn('${date}', event)" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition text-sm cursor-pointer leading-none" title="この列を削除">✕</button>` : ''}
      </div>
      <div class="print-only text-sm font-bold text-gray-700">${formatDate(date)}</div>
    </th>`).join('');

  // ── 食事スロット行（朝食/昼食/夕食）。ラベルは左軸へ ──
  const mealRows = MEAL_SLOTS.map(({ key, label }) => {
    const labelCell = `<td class="bg-orange-50 border-r border-orange-100 px-1 py-1.5 text-center align-middle sticky left-0 z-10">
      <span class="text-xs font-medium text-orange-500">${label}</span>
    </td>`;
    const cells = groups.map(([date]) => {
      const bg = dayBg(date);
      const inner = canEdit ? mealSelectHtml(date, key) : mealDisplayHtml(date, key);
      return `<td class="border-r border-gray-100 last:border-r-0 px-2 py-1.5 ${bg}">${inner}</td>`;
    }).join('');
    return `<tr class="border-t border-orange-100 bg-orange-50/40">${labelCell}${cells}</tr>`;
  }).join('');

  // ── 予定セクション：時刻軸（1時間=1行） ──
  // 表示する時間帯の範囲を決定（既定 7:00〜22:00、イベントがあれば拡張）
  let minHour = 7, maxHour = 22;
  const timed = currentEvents.filter(e => e.start_time);
  for (const e of timed) {
    const h = parseInt(e.start_time.slice(0, 2), 10);
    if (!isNaN(h)) { minHour = Math.min(minHour, h); maxHour = Math.max(maxHour, h); }
  }

  // date -> hour -> events[]
  function eventsAt(date, hour) {
    return currentEvents.filter(e => {
      if (e.date !== date || !e.start_time) return false;
      return parseInt(e.start_time.slice(0, 2), 10) === hour;
    });
  }

  function eventCardHtml(e) {
    const editing = e.id === editingId;
    const accent = e.kind === 'meal' ? 'bg-orange-50 border-orange-300' : 'bg-blue-50 border-blue-200';
    return `
      <div class="rounded border ${accent} ${editing ? 'ring-2 ring-blue-400' : ''} px-2 py-1 mb-1">
        <div class="flex items-start justify-between gap-1">
          <div class="min-w-0">
            ${timeBadge(e)}
            <div class="text-sm text-gray-800 break-words"><span class="mr-1">${kindIcon(e)}</span>${escapeHtml(e.description)}</div>
          </div>
          ${canEdit ? `
          <div class="flex gap-1 flex-shrink-0 no-print">
            <button onclick="event.stopPropagation();editEvent('${e.id}')" class="text-gray-400 hover:text-blue-500 transition text-xs" title="編集">✎</button>
            <button onclick="event.stopPropagation();deleteEvent('${e.id}')" class="text-gray-400 hover:text-red-500 transition text-xs" title="削除">✕</button>
          </div>` : ''}
        </div>
      </div>`;
  }

  // 時刻未定（start_time 空）の予定行
  const hasUntimed = currentEvents.some(e => !e.start_time);
  let untimedRow = '';
  if (hasUntimed) {
    const cells = groups.map(([date]) => {
      const evs = currentEvents.filter(e => e.date === date && !e.start_time);
      const bg = dayBg(date);
      return `<td class="border-r border-gray-100 last:border-r-0 px-2 py-2 align-top ${bg}">${evs.map(eventCardHtml).join('')}</td>`;
    }).join('');
    untimedRow = `<tr class="border-t border-gray-200">
      <td class="bg-gray-50 border-r border-gray-200 px-1 py-2 text-center align-top sticky left-0 z-10">
        <span class="text-xs text-gray-400 leading-tight">時刻<br>未定</span>
      </td>${cells}</tr>`;
  }

  // 時刻軸の各行
  let hourRows = '';
  for (let h = minHour; h <= maxHour; h++) {
    const hh = String(h).padStart(2, '0');
    const labelCell = `<td class="bg-gray-50 border-r border-gray-200 px-1 py-2 text-right align-top sticky left-0 z-10">
      <span class="text-xs text-gray-400">${h}:00</span>
    </td>`;
    const cells = groups.map(([date]) => {
      const evs = eventsAt(date, h);
      const bg = dayBg(date);
      const clickAttr = canEdit ? `onclick="selectDateHour('${date}','${hh}:00')" class="cursor-pointer border-r border-gray-100 last:border-r-0 px-2 py-1 align-top ${bg} hover:bg-blue-50/40 transition"` : `class="border-r border-gray-100 last:border-r-0 px-2 py-1 align-top ${bg}"`;
      return `<td ${clickAttr}>${evs.map(eventCardHtml).join('')}</td>`;
    }).join('');
    hourRows += `<tr class="border-t border-gray-100">${labelCell}${cells}</tr>`;
  }

  container.innerHTML = `
    <div class="bg-white rounded-xl shadow overflow-x-auto">
      <table class="text-sm border-collapse w-full">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-200">${cornerTh}${headerCells}</tr>
        </thead>
        <tbody>
          ${mealRows}
          ${untimedRow}
          ${hourRows}
        </tbody>
      </table>
    </div>`;
}

async function addShare() {
  const email      = document.getElementById('share-email').value.trim().toLowerCase();
  const permission = document.getElementById('share-permission').value;
  const errEl      = document.getElementById('share-error');
  const okEl       = document.getElementById('share-success');
  errEl.classList.add('hidden');
  okEl.classList.add('hidden');

  if (!email) { errEl.textContent = 'メールアドレスを入力してください。'; errEl.classList.remove('hidden'); return; }
  if (email === currentUser.email) { errEl.textContent = '自分自身と共有することはできません。'; errEl.classList.remove('hidden'); return; }

  const { error } = await sb.from('trip_shares').upsert(
    { trip_id: currentTrip.id, shared_with_email: email, permission },
    { onConflict: 'trip_id,shared_with_email' }
  );

  if (error) { errEl.textContent = error.message; errEl.classList.remove('hidden'); return; }
  okEl.textContent = `${email} に共有しました。`;
  okEl.classList.remove('hidden');
  document.getElementById('share-email').value = '';
  await refreshShareList();
}

async function removeShare(shareId) {
  const { error } = await sb.from('trip_shares').delete().eq('id', shareId);
  if (error) { alert(error.message); return; }
  await refreshShareList();
}

// ══════════════════════════════════════════════════
// Food master screen
// ══════════════════════════════════════════════════

async function loadFoodItems() {
  const { data, error } = await sb
    .from('food_items')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at');
  if (error) {
    // テーブル未作成などでも致命的にしない（旅程表は表示できる）
    console.warn('food_items load skipped:', error.message);
    foodItems = [];
    return;
  }
  foodItems = data || [];

  // Pre-populate defaults on first use（エラーが無かった場合のみ）
  if (foodItems.length === 0) {
    const inserts = DEFAULT_FOODS.map(name => ({ user_id: currentUser.id, name }));
    const { data: inserted, error: ie } = await sb.from('food_items').insert(inserts).select();
    if (!ie) foodItems = inserted || [];
  }
}

function renderFoodList() {
  const el = document.getElementById('food-items-list');
  if (!el) return;
  if (foodItems.length === 0) {
    el.innerHTML = '<div class="text-gray-400 text-sm text-center py-4">食べ物が登録されていません。</div>';
    return;
  }
  el.innerHTML = foodItems.map(f => `
    <div class="flex items-center justify-between px-3 py-2 rounded-lg bg-orange-50 border border-orange-100">
      <span class="text-sm text-gray-800">${escapeHtml(f.name)}</span>
      <button onclick="deleteFoodItem('${f.id}')" class="text-gray-400 hover:text-red-500 transition text-xs ml-3">✕</button>
    </div>`).join('');
}

function openFoodScreen(from) {
  foodScreenFrom = from || 'trips';
  showScreen('screen-food');
  loadFoodItems().then(() => renderFoodList());
}

function closeFoodScreen() {
  showScreen('screen-' + foodScreenFrom);
}

async function addFoodItem() {
  const input = document.getElementById('new-food-name');
  const name = input.value.trim();
  const errEl = document.getElementById('food-error');
  errEl.classList.add('hidden');

  if (!name) { input.focus(); return; }

  const { data, error } = await sb
    .from('food_items')
    .insert({ user_id: currentUser.id, name })
    .select()
    .single();

  if (error) {
    errEl.textContent = error.message;
    errEl.classList.remove('hidden');
    return;
  }
  foodItems.push(data);
  input.value = '';
  renderFoodList();
  // Refresh dropdowns if on detail screen
  if (foodScreenFrom === 'detail') render();
}

async function deleteFoodItem(id) {
  const { error } = await sb.from('food_items').delete().eq('id', id);
  if (error) { alert(error.message); return; }
  foodItems = foodItems.filter(f => f.id !== id);
  // Also clear meal assignments that used this item
  mealAssignments = mealAssignments.map(a =>
    a.food_item_id === id ? { ...a, food_item_id: null } : a
  );
  renderFoodList();
  if (foodScreenFrom === 'detail') render();
}

// ══════════════════════════════════════════════════
// Meal assignments
// ══════════════════════════════════════════════════

async function loadMealAssignments() {
  if (!currentTrip) { mealAssignments = []; return; }
  const { data, error } = await sb
    .from('meal_assignments')
    .select('*')
    .eq('trip_id', currentTrip.id);
  if (error) { console.error('meal_assignments load error:', error); mealAssignments = []; return; }
  mealAssignments = data || [];
}

async function setMealAssignment(date, slot, foodItemId) {
  if (!canEdit || !currentTrip) return;
  const existing = mealAssignments.find(a => a.date === date && a.meal_slot === slot);
  const fid = foodItemId || null;

  if (existing) {
    const { error } = await sb
      .from('meal_assignments')
      .update({ food_item_id: fid })
      .eq('id', existing.id);
    if (error) { alert(error.message); render(); return; }
    existing.food_item_id = fid;
  } else if (fid) {
    const { data, error } = await sb
      .from('meal_assignments')
      .upsert(
        { trip_id: currentTrip.id, date, meal_slot: slot, food_item_id: fid },
        { onConflict: 'trip_id,date,meal_slot' }
      )
      .select()
      .single();
    if (error) { alert(error.message); render(); return; }
    if (data) mealAssignments.push(data);
  }
  render();
}

function mealSelectHtml(date, slot) {
  const assignedIds = new Set(
    mealAssignments.filter(a => a.food_item_id).map(a => a.food_item_id)
  );
  const current = mealAssignments.find(a => a.date === date && a.meal_slot === slot);
  const currentId = current ? current.food_item_id : null;

  const available = foodItems.filter(f => !assignedIds.has(f.id) || f.id === currentId);

  const options = [
    `<option value="">—</option>`,
    ...available.map(f =>
      `<option value="${f.id}"${f.id === currentId ? ' selected' : ''}>${escapeHtml(f.name)}</option>`
    ),
  ].join('');

  const cls = currentId
    ? 'w-full text-xs border border-orange-300 rounded px-1 py-1 bg-white text-orange-800 cursor-pointer'
    : 'w-full text-xs border border-gray-200 rounded px-1 py-1 bg-gray-50 text-gray-400 cursor-pointer';

  return `<select class="${cls}" onchange="setMealAssignment('${date}','${slot}',this.value)">${options}</select>`;
}

function mealDisplayHtml(date, slot) {
  const current = mealAssignments.find(a => a.date === date && a.meal_slot === slot);
  if (!current || !current.food_item_id) return '<span class="text-xs text-gray-300">—</span>';
  const item = foodItems.find(f => f.id === current.food_item_id);
  return `<span class="text-xs text-orange-700">${item ? escapeHtml(item.name) : '—'}</span>`;
}

// ══════════════════════════════════════════════════
// Bootstrap — listen to auth state changes
// ══════════════════════════════════════════════════
// 重要: onAuthStateChange のコールバック内で直接 await して Supabase を
// 呼ぶと認証ロックを保持したままになりデッドロックする。setTimeout で
// コールバックの外に逃がして実行する（Supabase 公式の推奨パターン）。
let lastUserId = null;
let hasNavigated = false; // 初回の画面遷移を済ませたか
sb.auth.onAuthStateChange((event, session) => {
  if (session && session.user) {
    currentUser = session.user; // トークン更新時もユーザー情報は最新化
    // 既にログイン済みで画面遷移済みなら、ウィンドウ切替や
    // TOKEN_REFRESHED / 再 SIGNED_IN で画面を動かさない。
    if (hasNavigated && session.user.id === lastUserId) return;
    lastUserId = session.user.id;
    hasNavigated = true;
    setTimeout(() => { loadTrips(); }, 0);
  } else {
    lastUserId = null;
    hasNavigated = false;
    currentUser = null;
    setTimeout(() => { showScreen('screen-auth'); }, 0);
  }
});
</script>
